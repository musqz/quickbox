name: Release Debian Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PKG="quickbox_${VERSION}_all"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/usr/share/applications"

          # Binary
          cp quickbox "${PKG}/usr/local/bin/quickbox"
          chmod 0755 "${PKG}/usr/local/bin/quickbox"

          # Desktop entry
          cp quickbox.desktop "${PKG}/usr/share/applications/quickbox.desktop"

          # DEBIAN/control
          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: quickbox
          Version: ${VERSION}
          Architecture: all
          Maintainer: musqz
          Depends: python3, python3-gi, python3-gi-cairo, gir1.2-gtk-3.0, xclip
          Recommends: quickemu, qemu-system-x86, ovmf
          Section: misc
          Priority: optional
          Homepage: https://github.com/musqz/quickbox
          Description: GTK3 GUI for managing QEMU virtual machines
           A lightweight GTK3 frontend for quickemu. Supports VM creation,
           start/stop, snapshots, cloning, SSH port management, UEFI/BIOS
           boot, and distro downloads via quickget.
          EOF

          # Strip leading whitespace dpkg-deb is strict about
          sed -i 's/^          //' "${PKG}/DEBIAN/control"

          dpkg-deb --build --root-owner-group "${PKG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: quickbox_${{ steps.version.outputs.VERSION }}_all.deb
          generate_release_notes: true
